<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>RenovaHelpDesk</title>

  <style>
    body { font-family: Arial; background:#f4f6f9; margin:0; }
    header { background:#2c3e50; color:#fff; padding:15px; text-align:center; }
    .container { padding:20px; }

    input, select, textarea, button {
      width:100%; padding:10px; margin:5px 0;
    }

    button {
      background:#27ae60; color:#fff; border:none; cursor:pointer;
    }

    table {
      width:100%;
      border-collapse: collapse;
      margin-top:20px;
    }

    th, td {
      border:1px solid #ccc;
      padding:10px;
      text-align:left;
    }

    th {
      background:#34495e;
      color:#fff;
    }
  </style>
</head>

<body>

<header>
  <h1>RenovaHelpDesk</h1>
</header>

<div class="container">

  <h3>Abrir Chamado</h3>

  <input id="colaborador" placeholder="Colaborador">
  <input id="setor" placeholder="Setor">
  <input id="filial" placeholder="Filial">
  <textarea id="descricao" placeholder="Descrição do problema"></textarea>

  <button onclick="abrirChamado()">Abrir Chamado</button>

  <h3>Chamados</h3>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Colaborador</th>
        <th>Setor</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>

</div>

<script>

let tickets = [];

// ✅ (1) SALVAR VIA API
async function abrirChamado() {

  const chamado = {
    Data_Abertura: new Date().toISOString(),
    Colaborador: document.getElementById("colaborador").value,
    Setor: document.getElementById("setor").value,
    Filial: document.getElementById("filial").value,
    Categoria: "TI",
    Descricao_do_Problema: document.getElementById("descricao").value,
    Solucao: "",
    Prioridade: "Média",
    Status: "Aberto",
    Responsavel_TI: "TI"
  };

  await fetch("/chamados", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(chamado)
  });

  // limpa campos
  document.getElementById("colaborador").value = "";
  document.getElementById("setor").value = "";
  document.getElementById("filial").value = "";
  document.getElementById("descricao").value = "";

  carregarChamados();
}

// ✅ (2) FUNÇÃO PARA BUSCAR DO BACKEND
async function carregarChamados() {
  const res = await fetch("/chamados");
  tickets = await res.json();
  render();
}

// renderizar tabela
function render() {
  const tabela = document.getElementById("lista");
  tabela.innerHTML = "";

  tickets.forEach(c => {
    tabela.innerHTML += `
      <tr>
        <td>${c.id}</td>
        <td>${c.colaborador}</td>
        <td>${c.setor}</td>
        <td>${c.status}</td>
      </tr>
    `;
  });
}

// ✅ (3) CARREGAR AO INICIAR
carregarChamados();

</script>

</body>
</html>
